<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный плеер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Музыкальный плеер</h1>
    </header>
    
    <button id="addWidgetBtn" class="add-widget-btn">+ Добавить виджет</button>

    <div id="widgetContainer" class="widget-container"></div>

    <div id="widgetModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Добавить виджет</h2>
            <div class="widget-types">
                <button class="widget-type-btn active" data-type="html">
                    <span class="icon">&#60;/&#62;</span>
                    HTML код
                </button>
            </div>
            <div id="htmlWidgetPanel" class="widget-panel">
                <label>Введите HTML код (iframe, видео и т.д.):</label>
                <textarea id="widgetCode" placeholder='<iframe src="https://example.com"></iframe>'></textarea>
                <div class="size-settings">
                    <label>Ширина:</label>
                    <input type="text" id="widgetWidth" placeholder="100%" value="100%">
                    <label>Высота:</label>
                    <input type="text" id="widgetHeight" placeholder="300px" value="300px">
                </div>
                <button id="addHtmlWidget" class="primary-btn">Добавить виджет</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
