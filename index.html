<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный плеер</title>
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Музыкальный плеер">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Музыкальный плеер</h1>
    </header>
    
    <div class="controls">
        <button id="addWidgetBtn" class="btn btn-add" title="Добавить">+</button>
        <button id="removeAllBtn" class="btn btn-remove" title="Удалить все">🗑</button>
    </div>

    <div id="widgetContainer" class="widget-container"></div>

    <div id="widgetModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Добавить виджет</h2>
            <div class="widget-panel">
                <label>Код iframe:</label>
                <textarea id="widgetCode" placeholder='<iframe src="..."></iframe>'></textarea>
                <div class="size-settings">
                    <div class="size-input">
                        <label>Ширина:</label>
                        <input type="text" id="widgetWidth" value="100%">
                    </div>
                    <div class="size-input">
                        <label>Высота:</label>
                        <input type="text" id="widgetHeight" value="300px">
                    </div>
                </div>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="autoAdapt">
                        Автоадаптация
                    </label>
                    <label>
                        <input type="checkbox" id="autoCenter" checked>
                        Центрирование
                    </label>
                </div>
                <button id="saveWidgetBtn" class="btn btn-save">Добавить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
